<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:380px;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h3{
            text-align:center;
            color:#007bff;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #msg{
            text-align:center;
            margin-top:15px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

<div class="container">

    <h3>NagaSree_24WH1A0591</h3>

    <h2>Event Registration Form</h2>

    <form id="form">

        <input
            type="text"
            id="name"
            placeholder="Enter Name"
            required>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required>

        <input
            type="text"
            id="phone"
            placeholder="Enter Phone Number"
            required>

        <button type="submit">Register</button>

    </form>

    <p id="msg"></p>

</div>

<script>

document.getElementById("form").addEventListener("submit", async function(e){

    e.preventDefault();

    const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
    };

    try{

        const response = await fetch("/users/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        });

        if(response.ok){

            document.getElementById("msg").innerText =
            "Registration Successful!";

            document.getElementById("form").reset();

        }else{

            document.getElementById("msg").style.color="red";
            document.getElementById("msg").innerText =
            "Registration Failed!";

        }

    }catch(error){

        document.getElementById("msg").style.color="red";
        document.getElementById("msg").innerText =
        "Server Error!";

    }

});

</script>

</body>
</html>
